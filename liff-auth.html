<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>台股監控 — LINE 帳號綁定</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #0f1117; color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif; padding: 1rem;
    }
    .box {
      text-align: center; padding: 2.5rem 2rem;
      max-width: 320px; width: 100%;
      background: #1a1d27; border: 1px solid #2a2d3d; border-radius: 12px;
    }
    .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .title { font-size: 1.1rem; font-weight: 600; margin-bottom: .5rem; }
    .msg { color: #aaa; font-size: .85rem; line-height: 1.5; }
    .err { color: #f87171; }
    .spinner {
      width: 40px; height: 40px; border: 4px solid #2a2d3d;
      border-top-color: #4c6ef5; border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="box">
  <div id="spinner" class="spinner"></div>
  <div class="icon" id="icon" style="display:none"></div>
  <div class="title" id="title">正在驗證 LINE 身份…</div>
  <div class="msg"   id="msg"></div>
  <div id="friend-actions" style="display:none;margin-top:1.2rem;">
    <button onclick="openAddFriendPage()" style="padding:.6rem 1rem;background:#06c755;color:#fff;border:none;border-radius:8px;font-size:.9rem;cursor:pointer;">➕ 前往加好友</button>
    <button onclick="recheckFriendship()" style="margin-left:.5rem;padding:.6rem 1rem;background:#2a2d3d;color:#fff;border:1px solid #3a3f55;border-radius:8px;font-size:.9rem;cursor:pointer;">我已加入，重新驗證</button>
  </div>
</div>

<script>
// ── 設定（由 setup_supabase.py 自動填入，或手動替換） ──────────────────────
const SUPABASE_URL  = "https://rnqdglmrkotutzmirivp.supabase.co";
const SUPABASE_ANON = "sb_publishable_o4MJLqOmlmYmUBhloYbF1g_SzAgqSSs";
const LIFF_ID       = "2010668840-DXPfjNlx";
const OA_BASIC_ID   = "@408csebn";

function hideFriendActions() {
  const panel = document.getElementById("friend-actions");
  if (panel) panel.style.display = "none";
}

function setStatus(icon, title, msg, isErr) {
  hideFriendActions();
  document.getElementById("spinner").style.display = "none";
  const iconEl = document.getElementById("icon");
  iconEl.textContent  = icon;
  iconEl.style.display = "";
  document.getElementById("title").textContent = title;
  const m = document.getElementById("msg");
  m.textContent = msg;
  m.classList.toggle("err", !!isErr);
}

async function main() {
  // 取得 URL 中的 session token（QR 綁定模式才有）
  const params       = new URLSearchParams(location.search);
  const liffState    = params.get("liff.state");
  const sessionToken = params.get("token") ||
                       (liffState ? new URLSearchParams(liffState).get("token") : null);
  const isBindMode   = !!sessionToken;  // 有 token = QR 綁定；無 token = 直接登入跳轉

  // 初始化 LIFF
  try {
    await liff.init({ liffId: LIFF_ID });
  } catch (e) {
    setStatus("❌", "LIFF 初始化失敗", `LIFF ID 可能未設定或不正確：${e.message}`, true);
    return;
  }

  // 若未登入，導向 LINE 授權；botPrompt:"aggressive" 會在授權後自動彈出「加入官方帳號好友」確認畫面
  if (!liff.isLoggedIn()) {
    liff.login({ redirectUri: location.href, botPrompt: "aggressive" });
    return;
  }

  // 取得 LINE 個人資料
  let profile;
  try {
    profile = await liff.getProfile();
  } catch (e) {
    setStatus("❌", "無法取得 LINE 資料", e.message, true);
    return;
  }

  // 確認是否已加入官方帳號好友
  // 若未加入：自動重新導向並彈出加好友畫面（需 LINE Developers Console 已將 LOGIN channel 連結至 Messaging API channel）
  try {
    const friendship = await liff.getFriendship();
    if (!friendship?.friendFlag) {
      // 使用者尚未加好友（可能在彈出畫面按了「略過」）
      // 顯示說明 + 重試按鈕，讓使用者可以再觸發一次加好友畫面
      setStatus(
        "➕",
        "需要先加入好友",
        "請先點「前往加好友」，完成後再點「我已加入，重新驗證」。",
        false
      );
      document.getElementById("friend-actions").style.display = "";
      return;
    }
  } catch {
    // getFriendship 在部分瀏覽器環境不支援（如 External Browser 模式），忽略並繼續
  }

  // QR 綁定模式：更新 pending_line_auth（通知 PC watchlist.html 掃碼完成）
  if (isBindMode) {
    try {
      const url = new URL(`${SUPABASE_URL}/rest/v1/pending_line_auth`);
      url.searchParams.set("session_token", `eq.${sessionToken}`);
      const r = await fetch(url, {
        method: "PATCH",
        headers: {
          "apikey":        SUPABASE_ANON,
          "Authorization": `Bearer ${SUPABASE_ANON}`,
          "Content-Type":  "application/json",
          "Prefer":        "return=minimal",
        },
        body: JSON.stringify({
          line_user_id: profile.userId,
          display_name: profile.displayName,
        }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
    } catch (e) {
      setStatus("❌", "綁定失敗", `請重試或聯絡管理員（${e.message}）`, true);
      return;
    }
  }

  // 取得或建立 Supabase 用戶，並拿到 access_token
  let accessToken = null;
  try {
    const rpcRes = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_or_create_user`, {
      method: "POST",
      headers: {
        "apikey":        SUPABASE_ANON,
        "Authorization": `Bearer ${SUPABASE_ANON}`,
        "Content-Type":  "application/json",
      },
      body: JSON.stringify({
        p_line_user_id: profile.userId,
        p_display_name: profile.displayName,
      }),
    });
    if (rpcRes.ok) {
      const rows = await rpcRes.json();
      accessToken = rows?.[0]?.access_token ?? null;
    }
  } catch { /* 取不到 token 仍繼續，只是無法自動登入 */ }

  // 成功
  setStatus("✅", "綁定成功！", `${profile.displayName}，即將開啟監控頁面…`);

  // 2 秒後開啟 watchlist.html（帶 access_token 自動登入）
  setTimeout(() => {
    try {
      if (liff.isInClient()) {
        const dest = accessToken
          ? `https://betewo-web.github.io/CapitalGuard-pages/watchlist.html?token=${encodeURIComponent(accessToken)}`
          : `https://betewo-web.github.io/CapitalGuard-pages/watchlist.html`;
        liff.openWindow({ url: dest, external: true });
      }
    } catch {}
  }, 2000);
}

function openAddFriendPage() {
  const addFriendUrl = `https://line.me/R/ti/p/${OA_BASIC_ID}`;
  try {
    if (typeof liff !== "undefined" && liff.isInClient()) {
      liff.openWindow({ url: addFriendUrl, external: true });
    } else {
      window.open(addFriendUrl, "_blank");
    }
  } catch {
    window.open(addFriendUrl, "_blank");
  }
}

function recheckFriendship() {
  hideFriendActions();
  document.getElementById("spinner").style.display = "";
  document.getElementById("icon").style.display = "none";
  document.getElementById("title").textContent = "正在重新驗證 LINE 好友狀態…";
  const msgEl = document.getElementById("msg");
  msgEl.textContent = "";
  msgEl.classList.remove("err");
  location.reload();
}

main();
</script>
</body>
</html>
