// ═══════════════════════════════════════════════════════════════
// 設定：替換為你的 Supabase 專案資訊

const SUPABASE_URL  = "https://rnqdglmrkotutzmirivp.supabase.co";
const SUPABASE_ANON = "sb_publishable_o4MJLqOmlmYmUBhloYbF1g_SzAgqSSs";
const LIFF_ID       = "2010668840-DXPfjNlx";
const REPORT_DATA_URL = "report_data_latest.json";

function withCacheBust(url) {
  const sep = url.includes("?") ? "&" : "?";
  return `${url}${sep}t=${Date.now()}`;
}

// ── Supabase REST 輔助 ──────────────────────────────────────────

function sbHeaders(accessToken) {
  const h = {
    "apikey":        SUPABASE_ANON,
    "Authorization": `Bearer ${SUPABASE_ANON}`,
    "Content-Type":  "application/json",
    "Prefer":        "return=representation",
  };
  if (accessToken) h["x-access-token"] = accessToken;
  return h;
}

async function sbGet(table, params, accessToken) {
  const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
  url.searchParams.set("select", "*");
  for (const [k, v] of Object.entries(params || {})) url.searchParams.set(k, v);
  const r = await fetch(url, { headers: sbHeaders(accessToken) });
  if (!r.ok) throw new Error(`GET ${table}: ${r.status}`);
  return r.json();
}

async function sbPost(table, body, accessToken, minimal = false) {
  const headers = sbHeaders(accessToken);
  if (minimal) headers["Prefer"] = "return=minimal";
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: "POST", headers, body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`POST ${table}: ${r.status} ${await r.text()}`);
  if (minimal) return null;
  return r.json();
}

async function sbPatch(table, params, body, accessToken) {
  const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
  for (const [k, v] of Object.entries(params || {})) url.searchParams.set(k, v);
  const r = await fetch(url, {
    method: "PATCH", headers: sbHeaders(accessToken), body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`PATCH ${table}: ${r.status}`);
  return r.json();
}

async function sbDelete(table, params, accessToken) {
  const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
  for (const [k, v] of Object.entries(params || {})) url.searchParams.set(k, v);
  const r = await fetch(url, { method: "DELETE", headers: sbHeaders(accessToken) });
  if (!r.ok) throw new Error(`DELETE ${table}: ${r.status}`);
}

async function sbRpc(fn, params) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method: "POST",
    headers: {
      "apikey":        SUPABASE_ANON,
      "Authorization": `Bearer ${SUPABASE_ANON}`,
      "Content-Type":  "application/json",
    },
    body: JSON.stringify(params),
  });
  if (!r.ok) throw new Error(`RPC ${fn}: ${r.status} ${await r.text()}`);
  return r.json();
}

// ── 全域狀態 ────────────────────────────────────────────────────
let state = { userId: null, accessToken: null, displayName: "" };
let universe = {};   // sid → { n: name, i: industry }
let universeLoading = false;
let twseUniverseCache = null;
let tpexUniverseCache = null;
let sharedReportData = null;
let sharedDataLoadingPromise = null;
let klineChart = null;
let currentKLineSid = null;
let currentChipsView = "foreign";
let watchlistRows = [];
let alertModalRowId = null;
let removeModalRowId = null;

const KLINE_DIM_LABELS = {
  fundamental: "基本面",
  valuation: "估值面",
  industry: "產業面",
  chips: "籌碼面",
  technical: "技術面",
  risk: "風險面",
  capital: "資金面",
};

function normalizeStockInput(v) {
  return String(v || "").trim().replace(/\s+/g, " ");
}

function normalizeNameForSearch(name) {
  return String(name || "")
    .toLowerCase()
    .replace(/\s+/g, "")
    .replace(/股份有限公司|有限公司|股份有限|公司/g, "");
}

function isSubsequence(query, text) {
  if (!query) return true;
  let i = 0;
  for (const ch of text) {
    if (ch === query[i]) i += 1;
    if (i >= query.length) return true;
  }
  return false;
}

function findStockMatches(rawInput, limit = 15) {
  const q = normalizeNameForSearch(rawInput);
  if (!q) return [];

  const exactCode = q.match(/^\d{4}$/);
  if (exactCode && universe[exactCode[0]]) {
    return [[exactCode[0], universe[exactCode[0]]]];
  }

  const ranked = [];
  for (const [sid, v] of Object.entries(universe)) {
    const nameRaw = String(v?.n || "");
    const name = normalizeNameForSearch(nameRaw);
    let score = -1;
    if (sid.startsWith(q)) score = 0;
    else if (name === q) score = 1;
    else if (name.startsWith(q)) score = 2;
    else if (name.includes(q)) score = 3;
    else if (isSubsequence(q, name)) score = 4;
    if (score >= 0) ranked.push({ sid, v, score });
  }

  ranked.sort((a, b) => {
    if (a.score !== b.score) return a.score - b.score;
    return a.sid.localeCompare(b.sid);
  });
  return ranked.slice(0, limit).map(x => [x.sid, x.v]);
}

function resolveStock(rawInput) {
  const raw = normalizeStockInput(rawInput);
  if (!raw) return null;

  if (selectedSid) {
    return { sid: selectedSid, name: universe[selectedSid]?.n || "" };
  }

  const codeMatch = raw.match(/^(\d{4})\b/);
  if (codeMatch) {
    const sid = codeMatch[1];
    return { sid, name: universe[sid]?.n || "" };
  }

  const matches = findStockMatches(raw, 3);
  if (matches.length === 1) {
    const [sid, v] = matches[0];
    return { sid, name: v?.n || "" };
  }

  return null;
}

async function fetchTwseUniverseMap(force = false) {
  if (!force && twseUniverseCache && Object.keys(twseUniverseCache).length) {
    return twseUniverseCache;
  }

  try {
    const r = await fetch("https://openapi.twse.com.tw/v1/opendata/t187ap03_L");
    if (!r.ok) return {};
    const rows = await r.json();
    const m = {};
    for (const row of rows || []) {
      const sid = String(row["公司代號"] || "").trim();
      if (!/^\d{4}$/.test(sid)) continue;
      m[sid] = {
        n: String(row["公司簡稱"] || "").trim(),
        i: String(row["產業類別"] || "其他").trim(),
      };
    }
    if (Object.keys(m).length) {
      twseUniverseCache = m;
      return m;
    }
  } catch { /* ignore */ }
  return {};
}

async function fetchTpexUniverseMap(force = false) {
  if (!force && tpexUniverseCache && Object.keys(tpexUniverseCache).length) {
    return tpexUniverseCache;
  }

  try {
    const r = await fetch("https://www.tpex.org.tw/openapi/v1/mopsfin_t187ap03_O");
    if (!r.ok) return {};
    const rows = await r.json();
    const m = {};
    for (const row of rows || []) {
      const sid = String(row["SecuritiesCompanyCode"] || "").trim();
      if (!/^\d{4}$/.test(sid)) continue;
      m[sid] = {
        n: String(row["CompanyAbbreviation"] || row["CompanyName"] || "").trim(),
        i: String(row["Industry"] || "上櫃").trim(),
      };
    }
    if (Object.keys(m).length) {
      tpexUniverseCache = m;
      return m;
    }
  } catch { /* ignore */ }
  return {};
}

async function fetchAllUniverseMap() {
  const [twse, tpex] = await Promise.all([
    fetchTwseUniverseMap(),
    fetchTpexUniverseMap(),
  ]);
  return { ...twse, ...tpex };
}

async function validateStockCode(sid) {
  if (universe[sid]) {
    return { found: true, name: universe[sid].n || "", verifiable: true };
  }
  const m = await fetchAllUniverseMap();
  if (!Object.keys(m).length) {
    return { found: false, name: "", verifiable: false };
  }
  if (m[sid]) {
    universe[sid] = m[sid];
    return { found: true, name: m[sid].n || "", verifiable: true };
  }
  return { found: false, name: "", verifiable: true };
}

// ── LIFF 掃碼登入 ────────────────────────────────────────────────
let pollTimer = null;

async function initLiffLogin() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  const qrDiv    = document.getElementById("qrcode");
  const statusEl = document.getElementById("qr-status");
  const msgEl    = document.getElementById("login-msg");
  qrDiv.innerHTML = "";
  msgEl.innerHTML = "";
  statusEl.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> 產生中...';

  const sessionToken = crypto.randomUUID();
  try {
    await sbPost("pending_line_auth", { session_token: sessionToken }, null, true);
  } catch (e) {
    statusEl.innerHTML = `<span class="text-danger">❌ 無法建立 QR Code：${e.message}</span>`;
    return;
  }

  const liffUrl = `https://liff.line.me/${LIFF_ID}?token=${sessionToken}`;
  new QRCode(qrDiv, { text: liffUrl, width: 200, height: 200, colorDark: "#000", colorLight: "#fff" });
  statusEl.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> 等待掃碼（10 分鐘內有效）…';

  pollTimer = setInterval(() => pollForLogin(sessionToken), 3000);
  setTimeout(() => {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    statusEl.innerHTML = '<span class="text-warning">⏰ QR Code 已過期，請點「重新產生」</span>';
  }, 10 * 60 * 1000);
}

async function pollForLogin(sessionToken) {
  try {
    const rows = await sbGet("pending_line_auth",
      { session_token: `eq.${sessionToken}`, select: "line_user_id,display_name" }, null);
    const rec = rows?.[0];
    if (!rec?.line_user_id) return;
    clearInterval(pollTimer); pollTimer = null;
    document.getElementById("qr-wrap").style.display    = "none";
    document.getElementById("qr-success").style.display = "";
    await doLiffLogin(rec.line_user_id, rec.display_name);
  } catch { /* 忽略輪詢錯誤 */ }
}

async function doLiffLogin(lineUserId, displayName) {
  try {
    const rows = await sbRpc("get_or_create_user", {
      p_line_user_id: lineUserId,
      p_display_name: displayName || "用戶",
    });
    if (!rows?.length) throw new Error("取得用戶資料失敗");
    const row = rows[0];

    document.getElementById("qr-wrap").style.display    = "";

}

window.addEventListener("DOMContentLoaded", async () => {
  const saved = localStorage.getItem("sma_session");
  if (saved) {
    try {
      const s = JSON.parse(saved);
      state = s;
      await showMain();
      loadUniverse();
      return;
    } catch { localStorage.removeItem("sma_session"); }
  }
  loadUniverse();

  // 從 URL ?token= 參數自動登入（LIFF 跳轉後使用）
  const urlToken = new URLSearchParams(location.search).get("token");
  if (urlToken) {
    // 清除 URL 參數，避免 token 留在瀏覽器歷史
    history.replaceState(null, "", location.pathname);
    try {
      const rows = await sbGet("users", {}, urlToken);
      if (rows?.length) {
        const row = rows[0];
        state = { userId: row.id, accessToken: urlToken, displayName: row.display_name };
        localStorage.setItem("sma_session", JSON.stringify(state));
        await showMain();
        return;
      }
    } catch { /* token 無效，fall through 到 QR code 畫面 */ }
  }

  initLiffLogin();
});

async function loadUniverse() {
  if (universeLoading || Object.keys(universe).length > 0) return;
  universeLoading = true;
  let loaded = false;
  try {
    const r = await fetch("universe.json");
    if (r.ok) {
      universe = await r.json();
      twseUniverseCache = universe;
      loaded = Object.keys(universe).length > 0;
    }
  } catch { /* ignore */ }

  // 合併 TWSE + TPEx，避免上櫃股票（如 4939 亞電）搜尋不到
  const m = await fetchAllUniverseMap();
  if (Object.keys(m).length) {
    universe = { ...m, ...universe };
    loaded = true;
  }
  universeLoading = false;
  if (loaded && state.accessToken && document.getElementById("main-section").style.display !== "none") {
    await loadWatchlist();
  }
}

// ── 手動登入 / 建立帳號（備用）────────────────────────────────────
async function doLogin() {
  const lineId = document.getElementById("inp-line-id").value.trim();
  const name   = document.getElementById("inp-name").value.trim() || "用戶";
  const msg    = document.getElementById("manual-login-msg");

  if (!lineId.startsWith("U") || lineId.length < 10) {
    msg.innerHTML = '<span class="text-warning">LINE User ID 格式不正確，應以 U 開頭且長度 > 10</span>';
    return;
  }
  msg.innerHTML = '<span class="text-muted">查詢中…</span>';

  try {
    // 兩步驟註冊：
    // 1. INSERT with return=minimal（跳過 SELECT RLS，避免 INSERT+RETURNING 的時序問題）
    // 2. 再以 access_token GET 用戶資料
    const newToken = crypto.randomUUID();
    await sbPost("users", {
      line_user_id: lineId,
      display_name: name,
      access_token: newToken,
    }, null, true);  // minimal=true，不 RETURNING

    // 用剛產生的 token 讀取自己的資料
    const rows = await sbGet("users", {}, newToken);
    if (!rows || rows.length === 0) throw new Error("帳號建立後無法讀取，請重試");
    const row = rows[0];
    state = { userId: row.id, accessToken: newToken, displayName: row.display_name };
    localStorage.setItem("sma_session", JSON.stringify(state));

    msg.innerHTML = '<span class="text-success">✅ 帳號建立成功！</span>';
    await showMain();
  } catch (e) {
    // 若 line_user_id 已存在（UNIQUE 衝突），提示用 access_token 登入
    if (e.message.includes("23505") || e.message.includes("unique")) {
      showTokenLoginPrompt(lineId);
    } else {
      msg.innerHTML = `<span class="text-danger">❌ 錯誤：${e.message}</span>`;
    }
  }
}

async function loadSharedReportData(force = false) {
  if (!force && sharedReportData) return sharedReportData;
  if (!force && sharedDataLoadingPromise) return sharedDataLoadingPromise;

  sharedDataLoadingPromise = (async () => {
    const base = `${window.location.origin}${window.location.pathname.replace(/[^/]*$/, "")}`;
    const datedPath = `../output/report_data_${new Date().toISOString().slice(0, 10)}.json`;
    const candidates = [
      withCacheBust(REPORT_DATA_URL),
      withCacheBust("./report_data_latest.json"),
      withCacheBust(`${base}report_data_latest.json`),
      withCacheBust("../output/report_data_latest.json"),
      withCacheBust(datedPath),
    ];

    const attempts = [];
    for (const url of candidates) {
      try {
        const r = await fetch(url, { cache: "no-store" });
        if (!r.ok) {
          attempts.push(`${url} -> HTTP ${r.status}`);
          continue;
        }
        const json = await r.json();
        if (json && json.stock_data) {
          sharedReportData = json;
          return sharedReportData;
        }
        attempts.push(`${url} -> JSON 缺少 stock_data`);
      } catch (e) {
        attempts.push(`${url} -> ${e.message || "fetch failed"}`);
      }
    }
    throw new Error(`找不到報表共享資料；嘗試路徑：${attempts.join(" | ")}`);
  })();

  try {
    return await sharedDataLoadingPromise;
  } finally {
    sharedDataLoadingPromise = null;
  }
}

function renderKLineScoreBars(stock) {
  const scores = stock?.scores || {};
  const dims = [
    ["fundamental", "基本面"],
    ["valuation", "估值面"],
    ["industry", "產業面"],
    ["chips", "籌碼面"],
    ["technical", "技術面"],
    ["risk", "風險面"],
    ["capital", "資金面"],
  ];

  const html = dims.map(([key, label]) => {
    const raw = scores?.[key];
    const v = (raw === undefined || raw === null || raw === "") ? null : Math.round(Number(raw));
    const clickAttr = `onclick="showKLineDimDetail('${key}')"`;
    if (v === null || Number.isNaN(v)) {
      return `<div class="col text-center kline-score-item kline-score-clickable" ${clickAttr}><div class="kline-score-label">${label}</div><div class="kline-score-bar"><div class="kline-score-fill na" style="width:50%"></div></div><div class="kline-score-val na">—</div><div class="kline-score-tip">▼</div></div>`;
    }
    const color = v >= 65 ? "#2e7d32" : v >= 45 ? "#f57f17" : "#c62828";
    return `<div class="col text-center kline-score-item kline-score-clickable" ${clickAttr}><div class="kline-score-label">${label}</div><div class="kline-score-bar"><div class="kline-score-fill" style="width:${v}%;background:${color}"></div></div><div class="kline-score-val" style="color:${color}">${v}</div><div class="kline-score-tip">▼</div></div>`;
  }).join("");

  document.getElementById("kline-score-bars").innerHTML = html;
}

function showKLineDimDetail(dim) {
  const panel = document.getElementById("kline-dim-detail-panel");
  const content = document.getElementById("kline-dim-detail-content");
  if (!currentKLineSid || !sharedReportData?.stock_data?.[currentKLineSid]) return;

  if (panel.dataset.dim === dim && panel.style.display !== "none") {
    closeKLineDimDetail();
    return;
  }

  const stock = sharedReportData.stock_data[currentKLineSid];
  const details = stock?.dim_details?.[dim];
  const label = KLINE_DIM_LABELS[dim] || dim;
  const score = stock?.scores?.[dim];
  const scoreText = (score === undefined || score === null || Number.isNaN(Number(score))) ? "—" : Math.round(Number(score));

  let html = `<div class="d-flex justify-content-between align-items-center mb-2"><span class="fw-bold" style="font-size:.88rem;">${label} 細節（${scoreText}分）</span><button class="btn btn-sm py-0 px-1 btn-outline-secondary" style="font-size:.7rem;" onclick="closeKLineDimDetail()">關閉</button></div>`;

  if (!details || !details.items || !details.items.length) {
    html += `<div class="text-muted" style="font-size:.8rem;">此股票目前無 ${label} 細節資料。</div>`;
    content.innerHTML = html;
    panel.dataset.dim = dim;
    panel.style.display = "block";
    return;
  }

  html += '<div class="row g-0">';
  details.items.forEach(item => {
    const sv = Math.round(item?.score ?? 50);
    const c = sv >= 65 ? "#2e7d32" : sv >= 45 ? "#f57f17" : "#c62828";
    const noData = !item?.value || item.value === "—";
    const valueHtml = noData
      ? '<span class="kline-detail-no-data">無資料</span>'
      : `<span class="kline-detail-value">${escapeHtml(String(item.value))}</span>`;
    html += '<div class="col-12 col-sm-6 py-1 px-1"><div class="kline-detail-row">'
      + `<span class="kline-detail-label">${escapeHtml(String(item?.label || ""))}</span>`
      + (noData
          ? '<div class="kline-detail-bar bg"><div class="kline-detail-fill" style="width:50%;opacity:.35"></div></div><span class="kline-detail-score na">—</span>'
          : `<div class="kline-detail-bar"><div class="kline-detail-fill" style="width:${sv}%;background:${c}"></div></div><span class="kline-detail-score" style="color:${c}">${sv}</span>`)
      + valueHtml
      + '</div></div>';
  });
  html += '</div>';

  if (details.signals && details.signals.length) {
    html += '<div class="mt-1"><span class="text-muted" style="font-size:.75rem;">技術訊號：</span>'
      + details.signals.map(s => `<span class="badge bg-info text-dark me-1" style="font-size:.68rem;">${escapeHtml(String(s))}</span>`).join("")
      + '</div>';
  }

  content.innerHTML = html;
  panel.dataset.dim = dim;
  panel.style.display = "block";
}

  const panel = document.getElementById("kline-dim-detail-panel");

  panel.style.display = "none";

function renderKLineChartWhenVisible(sid, period) {
  const modalEl = document.getElementById("klineModal");
  const run = () => {
    renderKLineChart(sid, period);
    requestAnimationFrame(() => {
      if (klineChart) klineChart.resize();
    });
    setTimeout(() => {
      if (klineChart) klineChart.resize();
    }, 150);
  };

  if (modalEl.classList.contains("show")) {
    run();
    return;
  }

  const onShown = () => {
    modalEl.removeEventListener("shown.bs.modal", onShown);
    run();
  };
  modalEl.addEventListener("shown.bs.modal", onShown);
}

function renderKLineChart(sid, period) {
  const stock = sharedReportData?.stock_data?.[sid];
  if (!stock) return;
  const periodData = stock[period] || {};
  const levels = stock.levels || {};
  const chips = stock.chips || {};

  const el = document.getElementById("kline-chart");
  if (klineChart) {
    klineChart.dispose();
    klineChart = null;
  }
  el.innerHTML = "";
  klineChart = echarts.init(el, null, { renderer: "canvas" });
  klineChart.setOption(buildKLineOption(periodData, chips, levels, period), true);
}

async function fetchWatchlistFinMindStock(sid, name, industry) {
  try {
    const start = new Date();
    start.setDate(start.getDate() - 820);
    const startDate = start.toISOString().slice(0, 10);
    const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${encodeURIComponent(sid)}&start_date=${startDate}`;
    const resp = await fetch(url, { signal: typeof AbortSignal.timeout === "function" ? AbortSignal.timeout(20000) : undefined });
    if (!resp.ok) return null;
    const json = await resp.json();
    if (json.status !== 200 || !json.data || !json.data.length) return null;
    const raw = json.data.map(d => ({
      date: d.date,
      open: d.open,
      high: d.max,
      low: d.min,
      close: d.close,
      volume: d.Trading_Volume,
    }));
    return processWatchlistFinMindRaw(raw, sid, name, industry);
  } catch (e) {
    console.warn("[Watchlist FinMind]", sid, e.message);
    return null;
  }
}

function processWatchlistFinMindRaw(raw, sid, name, industry) {
  const dates = raw.map(d => d.date);
  const ohlcv = raw.map(d => [d.open, d.high, d.low, d.close, d.volume]);
  const closes = raw.map(d => d.close);
  const ma5 = maWatchlist(closes, 5);
  const ma10 = maWatchlist(closes, 10);
  const ma20 = maWatchlist(closes, 20);
  const daily = { dates, ohlcv, ma5, ma10, ma20 };

  const weeklyAgg = aggWatchlist(raw, "W");
  const weeklyCloses = weeklyAgg.ohlcv.map(d => d[3]);
  weeklyAgg.ma5 = maWatchlist(weeklyCloses, 5);
  weeklyAgg.ma10 = maWatchlist(weeklyCloses, 10);
  weeklyAgg.ma20 = maWatchlist(weeklyCloses, 20);

  const monthlyAgg = aggWatchlist(raw, "M");
  const monthlyCloses = monthlyAgg.ohlcv.map(d => d[3]);
  monthlyAgg.ma5 = maWatchlist(monthlyCloses, 5);
  monthlyAgg.ma10 = maWatchlist(monthlyCloses, 10);
  monthlyAgg.ma20 = maWatchlist(monthlyCloses, 20);

  const dimDetails = computeWatchlistDimDetails(daily);
  const scores = {};
  if (dimDetails.technical) scores.technical = dimDetails.technical.score;
  if (dimDetails.risk) scores.risk = dimDetails.risk.score;
  if (dimDetails.capital) scores.capital = dimDetails.capital.score;

  return {
    name: name || sid,
    industry: industry || "",
    scores,
    dim_details: dimDetails,
    daily,
    weekly: weeklyAgg,
    monthly: monthlyAgg,
    chips: {},
    levels: computeWatchlistLevels(raw, ma5, ma20, ma20),
  };
}

function maWatchlist(closes, period) {
  return closes.map((_, i) => {
    if (i < period - 1) return null;
    let sum = 0;
    for (let j = i - period + 1; j <= i; j++) sum += closes[j];
    return Math.round((sum / period) * 100) / 100;
  });
}

function aggWatchlist(raw, freq) {
  const groups = {};
  const keys = [];
  raw.forEach(d => {
    const dt = new Date(d.date);
    let key;
    if (freq === "W") {
      const dow = dt.getDay() || 7;
      const monday = new Date(dt);
      monday.setDate(dt.getDate() - dow + 1);
      key = monday.toISOString().slice(0, 10);
    } else {
      key = d.date.slice(0, 7);
    }
    if (!groups[key]) {
      keys.push(key);
      groups[key] = { date: d.date, open: d.open, high: d.high, low: d.low, close: d.close, volume: 0 };
    } else {
      groups[key].high = Math.max(groups[key].high, d.high);
      groups[key].low = Math.min(groups[key].low, d.low);
      groups[key].close = d.close;
      groups[key].date = d.date;
    }
    groups[key].volume += d.volume;
  });
  return {
    dates: keys.map(k => groups[k].date),
    ohlcv: keys.map(k => {
      const g = groups[k];
      return [g.open, g.high, g.low, g.close, g.volume];
    }),
  };
}

function computeWatchlistLevels(raw, ma5, ma20, ma60) {
  const w = 5;
  const res = [];
  const sup = [];
  const n = raw.length;
  const current = n ? raw[n - 1].close : 0;

  for (let i = w; i < n - w; i++) {
    let h = raw[i].high;
    let l = raw[i].low;
    let maxH = h;
    let minL = l;
    for (let j = i - w; j <= i + w; j++) {
      maxH = Math.max(maxH, raw[j].high);
      minL = Math.min(minL, raw[j].low);
    }
    if (h >= maxH) res.push(h);
    if (l <= minL) sup.push(l);
  }

  function clusterLevels(list) {
    if (!list.length) return [];
    const sorted = list
      .map(v => Math.round(v * 100) / 100)
      .sort((a, b) => a - b)
      .filter((v, i, arr) => i === 0 || v !== arr[i - 1]);
    const out = [];
    let group = [sorted[0]];
    for (let i = 1; i < sorted.length; i++) {
      if (sorted[i] <= group[group.length - 1] * 1.025) group.push(sorted[i]);
      else {
        out.push(Math.round((group.reduce((a, b) => a + b, 0) / group.length) * 100) / 100);
        group = [sorted[i]];
      }
    }
    out.push(Math.round((group.reduce((a, b) => a + b, 0) / group.length) * 100) / 100);
    return out;
  }

  const ma = {};
  if (ma5[n - 1]) ma.MA5 = ma5[n - 1];
  if (ma20[n - 1]) ma.MA20 = ma20[n - 1];
  if (ma60[n - 1]) ma.MA60 = ma60[n - 1];

  return {
    support: clusterLevels(sup).filter(v => v < current * 1.02).reverse().slice(0, 3),
    resistance: clusterLevels(res).filter(v => v > current * 0.98).slice(0, 3),
    ma,
    current: Math.round(current * 100) / 100,
  };
}

function computeWatchlistDimDetails(daily) {
  if (!daily || !daily.ohlcv || daily.ohlcv.length < 20) return {};
  const n = daily.ohlcv.length;
  const closes = daily.ohlcv.map(d => d[3]);
  const volumes = daily.ohlcv.map(d => d[4]);
  const ma5v = daily.ma5 && daily.ma5[n - 1];
  const ma10v = daily.ma10 && daily.ma10[n - 1];
  const ma20v = daily.ma20 && daily.ma20[n - 1];

  const maAlign = ((ma5v && ma10v && ma5v > ma10v) ? 1 : 0) + ((ma10v && ma20v && ma10v > ma20v) ? 1 : 0) + ((ma5v && closes[n - 1] > ma5v) ? 1 : 0);
  const maAS = maAlign * 33.3;
  const rsiV = rsiWatchlist(closes, 14);
  const rsiSc = (rsiV >= 45 && rsiV <= 65) ? 78 : ((rsiV > 80 || rsiV < 20) ? 18 : 42);
  const macdR = macdWatchlist(closes);
  const macdSc = Math.min(85, Math.max(15, 50 + macdR.hist * 100));
  const volMA = volumes.slice(-21, -1).reduce((a, b) => a + b, 0) / 20;
  const volR = volMA > 0 ? volumes[n - 1] / volMA : 1;
  const volSc = volR >= 2 ? 90 : volR >= 1.5 ? 75 : volR >= 1.2 ? 60 : 45;
  const techSc = Math.round(maAS * 0.25 + rsiSc * 0.2 + macdSc * 0.25 + volSc * 0.15 + 50 * 0.15);
  const signals = [];
  if (ma5v && ma20v && daily.ma5[n - 6] < daily.ma20[n - 6] && ma5v > ma20v) signals.push("MA5黃金交叉");
  if (ma20v && closes[n - 1] > ma20v && closes[n - 6] < (daily.ma20[n - 6] || closes[n - 1])) signals.push("突破MA20");
  if (macdR.crossUp) signals.push("MACD黃金交叉");
  if (volR >= 1.5) signals.push(`量能放大${volR.toFixed(1)}x`);

  const rets = closes.slice(1).map((c, i) => (c - closes[i]) / closes[i]);
  const r20 = rets.slice(-20);
  const m20 = r20.reduce((a, b) => a + b, 0) / r20.length;
  const std20 = Math.sqrt(r20.reduce((s, r) => s + Math.pow(r - m20, 2), 0) / r20.length);
  const annVol = std20 * Math.sqrt(252) * 100;
  let peak = closes[0];
  let maxDd = 0;
  closes.forEach(c => {
    peak = Math.max(peak, c);
    maxDd = Math.min(maxDd, ((c - peak) / peak) * 100);
  });
  const vsc = Math.min(100, Math.max(0, 100 - annVol * 3));
  const dsc = Math.min(100, Math.max(0, 100 + maxDd * 2));
  const riskSc = Math.round(vsc * 0.4 + dsc * 0.4 + 50 * 0.2);

  const rf = 0.02 / 252;
  const exc = rets.map(r => r - rf);
  const mEx = exc.reduce((a, b) => a + b, 0) / exc.length;
  const sEx = Math.sqrt(exc.reduce((s, r) => s + Math.pow(r - mEx, 2), 0) / exc.length);
  const sharpe = sEx > 0 ? mEx / sEx * Math.sqrt(252) : 0;
  const neg = exc.filter(r => r < 0);
  const dSt = neg.length ? Math.sqrt(neg.reduce((s, r) => s + r * r, 0) / neg.length) : 0.001;
  const sortino = dSt > 0 ? mEx / dSt * Math.sqrt(252) : 0;
  const shSc = Math.min(100, Math.max(0, 50 + sharpe * 20));
  const capSc = Math.round(shSc * 0.5 + Math.min(100, Math.max(0, 50 + sortino * 15)) * 0.5);

  return {
    technical: {
      score: techSc,
      items: [
        { label: "均線多頭排列", value: `${maAlign}/3`, score: Math.round(maAS) },
        { label: "RSI(14)", value: rsiV.toFixed(1), score: Math.round(rsiSc) },
        { label: "MACD 柱狀", value: macdR.hist.toFixed(4), score: Math.round(macdSc) },
        { label: "量能比", value: `${volR.toFixed(2)}x`, score: Math.round(volSc) },
      ],
      signals,
    },
    risk: {
      score: riskSc,
      items: [
        { label: "年化波動率", value: `${annVol.toFixed(1)}%`, score: Math.round(vsc) },
        { label: "最大回撤", value: `${maxDd.toFixed(1)}%`, score: Math.round(dsc) },
      ],
    },
    capital: {
      score: capSc,
      items: [
        { label: "Sharpe 比率", value: sharpe.toFixed(2), score: Math.round(shSc) },
        { label: "Sortino 比率", value: sortino.toFixed(2), score: Math.round(Math.min(100, Math.max(0, 50 + sortino * 15))) },
      ],
    },
  };
}

function rsiWatchlist(closes, period) {
  if (closes.length < period + 1) return 50;
  let gain = 0;
  let loss = 0;
  for (let i = closes.length - period; i < closes.length; i++) {
    const diff = closes[i] - closes[i - 1];
    if (diff > 0) gain += diff;
    else loss -= diff;
  }
  return 100 - 100 / (1 + (gain / (loss || 0.0001)));
}

function macdWatchlist(closes) {
  function ema(data, period) {
    const k = 2 / (period + 1);
    const result = [data[0]];
    for (let i = 1; i < data.length; i++) result.push(data[i] * k + result[i - 1] * (1 - k));
    return result;
  }
  const e12 = ema(closes, 12);
  const e26 = ema(closes, 26);
  const mac = e12.map((v, i) => v - e26[i]);
  const sig = ema(mac, 9);
  const n = closes.length;
  return {
    hist: mac[n - 1] - sig[n - 1],
    crossUp: n >= 4 && mac[n - 1] > sig[n - 1] && mac[n - 4] < sig[n - 4],
  };
}

function buildKLineOption(pd, chips, levels, period) {
  const dates = pd.dates || [];
  const ohlcv = pd.ohlcv || [];
  const n = dates.length;
  const kData = ohlcv.map(d => [d[0], d[3], d[2], d[1]]);
  const volData = ohlcv.map((d, i) => {
    const prevClose = i > 0 ? ohlcv[i - 1][3] : d[0];
    const c = d[3] > prevClose ? "rgba(239,83,80,0.75)" : d[3] < prevClose ? "rgba(38,166,154,0.75)" : "rgba(255,235,59,0.85)";
    return { value: d[4], itemStyle: { color: c } };
  });

  const markLines = [];
  (levels.support || []).forEach(v => {
    markLines.push([
      { coord: [dates[0], v], lineStyle: { color: "#26a69a", type: "dashed", width: 1.5 } },
      { coord: [dates[n - 1], v], label: { formatter: `支 ${Number(v).toFixed(2)}`, position: "end", fontSize: 10, color: "#26a69a" } },
    ]);
  });
  (levels.resistance || []).forEach(v => {
    markLines.push([
      { coord: [dates[0], v], lineStyle: { color: "#ef5350", type: "dashed", width: 1.5 } },
      { coord: [dates[n - 1], v], label: { formatter: `壓 ${Number(v).toFixed(2)}`, position: "end", fontSize: 10, color: "#ef5350" } },
    ]);
  });

  const defaultBars = period === "monthly" ? 5760 : period === "weekly" ? 720 : 90;
  const dzStart = Math.max(0, Math.round(100 - (100 * defaultBars / Math.max(n, 1))));

  const chipDates = chips?.dates || [];
  const chipMapByView = {
    foreign: chips?.foreign || [],
    trust: chips?.trust || [],
    dealer: chips?.dealer || [],
    total: chips?.total || [],
  };
  const chipSrc = chipMapByView[currentChipsView] || [];
  const chipValueByDate = {};
  chipDates.forEach((d, i) => {
    const val = chipSrc?.[i];
    chipValueByDate[d] = (val === undefined || val === null || Number.isNaN(Number(val))) ? 0 : Number(val);
  });
  const chipsSeriesData = dates.map(d => {
    const v = chipValueByDate[d];
    if (v === undefined || v === null) return null;
    return {
      value: v,
      itemStyle: { color: v >= 0 ? "rgba(60, 230, 209, 0.75)" : "rgba(255, 95, 133, 0.75)" },
    };
  });
  const hasChips = period === "daily" && currentChipsView !== "hide" && dates.length > 0 && chipsSeriesData.some(v => v !== null);

  const grids = hasChips
    ? [
      { left: 70, right: 55, top: 50, height: "42%" },
      { left: 70, right: 55, top: "56%", height: "14%" },
      { left: 70, right: 55, top: "74%", height: "16%" },
    ]
    : [
      { left: 70, right: 55, top: 50, height: "58%" },
      { left: 70, right: 55, top: "72%", height: "20%" },
    ];

  const gridIndexes = hasChips ? [0, 1, 2] : [0, 1];

  const xAxis = gridIndexes.map(i => ({
    type: "category",
    gridIndex: i,
    data: dates,
    axisLabel: { show: i !== 0, fontSize: 10, color: "#a6badf" },
    axisLine: { onZero: false },
    splitLine: { show: false },
  }));

  const yAxis = gridIndexes.map(i => ({
    scale: true,
    gridIndex: i,
    splitNumber: i === 0 ? 5 : 3,
    axisLabel: { fontSize: 10, color: "#a6badf" },
    splitLine: { lineStyle: { color: "rgba(148,171,220,0.18)" } },
  }));

  const legendData = ["K線", "MA5", "MA10", "MA20", "成交量(張)"];
  if (hasChips) {
    const chipLabel = currentChipsView === "foreign" ? "外資" : currentChipsView === "trust" ? "投信" : currentChipsView === "dealer" ? "自營商" : "三大合計";
    legendData.push(`${chipLabel}淨買超`);
  }

  const series = [
    {
      name: "K線",
      type: "candlestick",
      xAxisIndex: 0,
      yAxisIndex: 0,
      data: kData,
      itemStyle: { color: "#ef5350", color0: "#26a69a", borderColor: "#ef5350", borderColor0: "#26a69a" },
      markLine: { silent: true, symbol: "none", data: markLines, animation: false },
    },
    { name: "MA5", type: "line", xAxisIndex: 0, yAxisIndex: 0, data: pd.ma5 || [], symbol: "none", lineStyle: { width: 1.2, color: "#ff9800" } },
    { name: "MA10", type: "line", xAxisIndex: 0, yAxisIndex: 0, data: pd.ma10 || [], symbol: "none", lineStyle: { width: 1.2, color: "#2196f3" } },
    { name: "MA20", type: "line", xAxisIndex: 0, yAxisIndex: 0, data: pd.ma20 || [], symbol: "none", lineStyle: { width: 1.5, color: "#9c27b0" } },
    { name: "成交量(張)", type: "bar", xAxisIndex: 1, yAxisIndex: 1, data: volData, barMaxWidth: 8 },
  ];

  if (hasChips) {
    const chipLabel = currentChipsView === "foreign" ? "外資" : currentChipsView === "trust" ? "投信" : currentChipsView === "dealer" ? "自營商" : "三大合計";
    series.push({
      name: `${chipLabel}淨買超`,
      type: "bar",
      xAxisIndex: 2,
      yAxisIndex: 2,
      data: chipsSeriesData,
      barMaxWidth: 8,
    });
  }

  return {
    animation: false,
    backgroundColor: "transparent",
    tooltip: {
      trigger: "axis",
      axisPointer: { type: "cross" },
      formatter: params => {
        if (!params?.length) return "";
        let h = `<div style="font-size:12px;padding:4px;"><b>${params[0].axisValue}</b><br/>`;
        params.forEach(p => {
          if (p.seriesName === "K線" && Array.isArray(p.data)) {
            h += `開:<b>${p.data[1]}</b> 高:<b>${p.data[4]}</b> 低:<b>${p.data[3]}</b> 收:<b>${p.data[2]}</b><br/>`;
          } else if (p.seriesName === "成交量(張)") {
            const v = p.data?.value ?? p.data;
            h += `成交量:<b>${Math.round(v / 1000).toLocaleString()}</b>張<br/>`;
          } else if (p.data !== null && !Array.isArray(p.data)) {
            h += `${p.seriesName}:<b>${p.data}</b><br/>`;
          }
        });
        return `${h}</div>`;
      },
    },
    legend: { data: legendData, top: 5, itemWidth: 14, textStyle: { fontSize: 11, color: "#dce7ff" } },
    grid: grids,
    xAxis,
    yAxis,
    dataZoom: [
      { type: "inside", xAxisIndex: gridIndexes, start: dzStart, end: 100 },
      { type: "slider", xAxisIndex: gridIndexes, bottom: 5, height: 18 },
    ],
    series,
  };
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

async function addStock() {
  const inp    = document.getElementById("inp-stock");
  const msgEl  = document.getElementById("add-msg");

  const universeReady = Object.keys(universe).length > 0;

  if (!rawVal) { msgEl.innerHTML = '<span class="text-warning">請輸入股票代號或名稱</span>'; return; }

  if (!matched && !universeReady) {
    await loadUniverse();
    matched = resolveStock(rawVal);
  }

  if (!matched) {
    if (!Object.keys(universe).length) {
      msgEl.innerHTML = '<span class="text-warning">⚠️ 股票清單載入中，名稱搜尋暫不可用；請先輸入 4 碼代號（如 2330）</span>';
      return;
    }
    msgEl.innerHTML = '<span class="text-warning">⚠️ 找不到此股票，請改輸入 4 碼代號或從下拉清單選擇</span>';
    return;
  }

  const sid  = matched.sid;
  let name = matched.name;

  if (!/^\d{4}$/.test(sid)) {
    msgEl.innerHTML = '<span class="text-warning">⚠️ 股票代號格式錯誤，請輸入 4 碼數字（如 2330）</span>';
    return;
  }

  if (!universe[sid]) {
    const check = await validateStockCode(sid);
    if (!check.found) {
      if (!check.verifiable) {
        msgEl.innerHTML = '<span class="text-warning">⚠️ 無法連線驗證股票代號，請稍後再試</span>';
      } else {
        msgEl.innerHTML = `<span class="text-warning">⚠️ 查無股票代號 ${sid}，請確認後重試</span>`;
      }
      return;
    }
    if (check.name) name = check.name;
  }

  msgEl.innerHTML = '<span class="text-muted">新增中…</span>';
  try {
    await sbPost("watchlist", {
      user_id:    state.userId,
      stock_id:   sid,
      stock_name: name,
      alert_break_support:    true,
      alert_near_support:     true,
      alert_break_resistance: false,
      alert_near_resistance:  false,
    }, state.accessToken);
    inp.value = "";
    selectedSid = null;
    document.getElementById("autocomplete-list").style.display = "none";
    msgEl.innerHTML = `<span class="text-success">✅ 已加入 ${sid} ${name}</span>`;
    await loadWatchlist();
  } catch (e) {
    if (e.message.includes("23505") || e.message.includes("unique")) {
      msgEl.innerHTML = `<span class="text-warning">⚠️ ${sid} 已在清單中</span>`;
    } else {
      msgEl.innerHTML = `<span class="text-danger">❌ 失敗：${e.message}</span>`;
    }
  }
}

  if (Object.keys(universe).length === 0) {
    list.innerHTML = '<div class="dropdown-item text-muted">載入股票清單中...</div>';
    list.style.display = "block";
    await loadUniverse();
  }

  if (Object.keys(universe).length === 0) {
    // fallback：清單載入失敗時，仍可用 4 碼代號即時驗證
    if (/^\d{4}$/.test(qRaw)) {
      const check = await validateStockCode(qRaw);
      if (check.found) {
        const name = check.name || qRaw;
        list.innerHTML = `<div class="dropdown-item" onclick="selectStock('${qRaw}', '${String(name).replace(/'/g, "\\'")}')"><span class="badge-sid me-2">${qRaw}</span>${name}</div>`;
        list.style.display = "block";
        return;
      }
    }
    list.innerHTML = '<div class="dropdown-item text-warning">目前無法載入股票清單，請先輸入 4 碼代號（如 4939）後按加入</div>';
    list.style.display = "block";
    return;
  }

  const matches = findStockMatches(qRaw, 15);

  if (!matches.length) {
    list.innerHTML = '<div class="dropdown-item text-muted">查無符合結果</div>';
    list.style.display = "block";
    return;
  }

  list.innerHTML = matches.map(([sid, v]) =>
    `<div class="dropdown-item" onclick="selectStock('${sid}', '${(v.n||"").replace(/'/g,"\\'")}')">
       <span class="badge-sid me-2">${sid}</span>${v.n || ""}
     </div>`
  ).join("");
  list.style.display = "block";
}

function selectStock(sid, name) {
  selectedSid = sid;
  document.getElementById("inp-stock").value = `${sid} ${name}`;
  document.getElementById("autocomplete-list").style.display = "none";
}

function onStockKey(e) {
  if (e.key === "Enter") { addStock(); return; }
  if (e.key === "Escape") document.getElementById("autocomplete-list").style.display = "none";
}

document.addEventListener("click", e => {
  const inputEl = document.getElementById("inp-stock");
  const listEl = document.getElementById("autocomplete-list");
  if (!inputEl.contains(e.target) && !listEl.contains(e.target))
    document.getElementById("autocomplete-list").style.display = "none";
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
