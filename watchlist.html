<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>台股監控 — 個人自選股設定</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f1117; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
    .card { background: #1a1d27; border: 1px solid #2a2d3d; }
    .card-header { background: #12151f; border-bottom: 1px solid #2a2d3d; }
    .form-control, .form-select {
      background: #12151f; border: 1px solid #2a2d3d; color: #e0e0e0;
    }
    .form-control:focus, .form-select:focus {
      background: #12151f; color: #e0e0e0;
      border-color: #4c6ef5; box-shadow: 0 0 0 0.2rem rgba(76,110,245,0.25);
    }
    .form-control::placeholder { color: #555; }
    .table { color: #e0e0e0; }
    .table td, .table th { border-color: #2a2d3d; vertical-align: middle; }
    .badge-sid { background:#1e3a5f; color:#7eb8f7; font-size:.85rem; padding:.35em .6em; border-radius:4px; }
    #autocomplete-list { background:#1a1d27; border:1px solid #2a2d3d; z-index:1000; }
    #autocomplete-list .dropdown-item { color:#e0e0e0; padding:.5rem .75rem; cursor:pointer; }
    #autocomplete-list .dropdown-item:hover { background:#2a2d3d; }
    .toggle-cell .form-check-input { width:2.2em; height:1.1em; cursor:pointer; }
    .step-badge { background:#4c6ef5; color:#fff; border-radius:50%; width:24px; height:24px;
                  display:inline-flex; align-items:center; justify-content:center;
                  font-size:.8rem; font-weight:700; flex-shrink:0; }
  </style>
</head>
<body>

<!-- ── 頂部導航 ── -->
<nav class="navbar navbar-dark" style="background:#12151f;border-bottom:1px solid #2a2d3d;">
  <div class="container-lg">
    <span class="navbar-brand fw-bold">📊 台股監控</span>
    <span id="nav-user" class="text-muted small"></span>
  </div>
</nav>

<div class="container-lg py-4" style="max-width:860px">

  <!-- ── 登入區（未登入時顯示） ── -->
  <div id="login-section">
    <div class="card mb-4">
      <div class="card-header py-3">
        <h5 class="mb-0">🔑 登入 / 建立帳號</h5>
      </div>
      <div class="card-body p-4">
        <p class="text-muted small mb-3">
          輸入您的 LINE User ID 來建立或取回您的帳號。
          不知道自己的 LINE User ID？請向 LINE Bot 傳送「<code>我的ID</code>」。
        </p>
        <div class="row g-2 align-items-end">
          <div class="col-md-5">
            <label class="form-label text-muted small">您的 LINE User ID</label>
            <input id="inp-line-id" class="form-control" placeholder="U1a2b3c4d5e6f...">
          </div>
          <div class="col-md-3">
            <label class="form-label text-muted small">顯示名稱</label>
            <input id="inp-name" class="form-control" placeholder="Alice">
          </div>
          <div class="col-md-4">
            <button class="btn btn-primary w-100" onclick="doLogin()">登入 / 建立帳號</button>
          </div>
        </div>
        <div id="login-msg" class="mt-2 small"></div>

        <!-- 說明步驟 -->
        <hr class="mt-4" style="border-color:#2a2d3d">
        <p class="text-muted small mb-2">如何取得 LINE User ID？</p>
        <div class="d-flex flex-column gap-2">
          <div class="d-flex align-items-start gap-2">
            <span class="step-badge">1</span>
            <span class="small text-muted">將 LINE Bot 加為好友（掃描 Messaging API 中的 QR Code）</span>
          </div>
          <div class="d-flex align-items-start gap-2">
            <span class="step-badge">2</span>
            <span class="small text-muted">在聊天視窗輸入 <code>我的ID</code>，Bot 即回覆您的 User ID</span>
          </div>
          <div class="d-flex align-items-start gap-2">
            <span class="step-badge">3</span>
            <span class="small text-muted">貼入上方欄位，輸入名稱，點「登入 / 建立帳號」</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 主畫面（已登入時顯示） ── -->
  <div id="main-section" style="display:none">

    <!-- 新增股票 -->
    <div class="card mb-4">
      <div class="card-header py-2 d-flex justify-content-between align-items-center">
        <span class="fw-semibold">➕ 新增追蹤股票</span>
      </div>
      <div class="card-body p-3">
        <div class="d-flex gap-2 position-relative">
          <div class="flex-grow-1 position-relative">
            <input id="inp-stock" class="form-control" placeholder="輸入股票代號或名稱，如 2330 或 台積電"
                   autocomplete="off" oninput="onStockInput()" onkeydown="onStockKey(event)">
            <div id="autocomplete-list" class="position-absolute w-100 rounded" style="display:none;top:100%;max-height:200px;overflow-y:auto;"></div>
          </div>
          <button class="btn btn-success px-4" onclick="addStock()">加入</button>
        </div>
        <div id="add-msg" class="mt-2 small"></div>
      </div>
    </div>

    <!-- 自選股清單 -->
    <div class="card">
      <div class="card-header py-2 d-flex justify-content-between align-items-center">
        <span class="fw-semibold">📋 我的自選股 <span id="wl-count" class="badge bg-secondary ms-1">0</span></span>
        <button class="btn btn-sm btn-outline-secondary" onclick="logout()">登出</button>
      </div>
      <div class="card-body p-0">
        <div id="wl-empty" class="text-center py-5 text-muted" style="display:none">
          尚未加入任何股票，從上方搜尋並加入吧！
        </div>
        <div class="table-responsive">
          <table class="table table-sm mb-0" id="wl-table" style="display:none">
            <thead>
              <tr style="font-size:.8rem;color:#888">
                <th>代號</th>
                <th>名稱</th>
                <th class="text-center">⚠️ 跌破支撐</th>
                <th class="text-center">🟢 逼近支撐</th>
                <th class="text-center">⚡ 突破壓力</th>
                <th class="text-center">🔴 逼近壓力</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="wl-body"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div><!-- /main-section -->
</div><!-- /container -->

<script>
// ═══════════════════════════════════════════════════════════════
// 設定：替換為你的 Supabase 專案資訊
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL  = "https://rnqdglmrkotutzmirivp.supabase.co";
const SUPABASE_ANON = "sb_publishable_o4MJLqOmlmYmUBhloYbF1g_SzAgqSSs";

// ── Supabase REST 輔助 ──────────────────────────────────────────

function sbHeaders(accessToken) {
  const h = {
    "apikey":        SUPABASE_ANON,
    "Authorization": `Bearer ${SUPABASE_ANON}`,
    "Content-Type":  "application/json",
    "Prefer":        "return=representation",
  };
  if (accessToken) h["x-access-token"] = accessToken;
  return h;
}

async function sbGet(table, params, accessToken) {
  const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
  url.searchParams.set("select", "*");
  for (const [k, v] of Object.entries(params || {})) url.searchParams.set(k, v);
  const r = await fetch(url, { headers: sbHeaders(accessToken) });
  if (!r.ok) throw new Error(`GET ${table}: ${r.status}`);
  return r.json();
}

async function sbPost(table, body, accessToken, minimal = false) {
  const headers = sbHeaders(accessToken);
  if (minimal) headers["Prefer"] = "return=minimal";
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: "POST", headers, body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`POST ${table}: ${r.status} ${await r.text()}`);
  if (minimal) return null;
  return r.json();
}

async function sbPatch(table, params, body, accessToken) {
  const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
  for (const [k, v] of Object.entries(params || {})) url.searchParams.set(k, v);
  const r = await fetch(url, {
    method: "PATCH", headers: sbHeaders(accessToken), body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`PATCH ${table}: ${r.status}`);
  return r.json();
}

async function sbDelete(table, params, accessToken) {
  const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
  for (const [k, v] of Object.entries(params || {})) url.searchParams.set(k, v);
  const r = await fetch(url, { method: "DELETE", headers: sbHeaders(accessToken) });
  if (!r.ok) throw new Error(`DELETE ${table}: ${r.status}`);
}

// ── 全域狀態 ────────────────────────────────────────────────────
let state = { userId: null, accessToken: null, displayName: "" };
let universe = {};   // sid → { n: name, i: industry }

// ── 初始化 ──────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", async () => {
  // 嘗試從 localStorage 恢復登入狀態
  const saved = localStorage.getItem("sma_session");
  if (saved) {
    try {
      const s = JSON.parse(saved);
      state = s;
      await showMain();
    } catch { localStorage.removeItem("sma_session"); }
  }
  // 載入股票宇宙（供搜尋）
  loadUniverse();
});

async function loadUniverse() {
  try {
    const r = await fetch("universe.json");
    if (r.ok) universe = await r.json();
  } catch { /* 無 universe.json，搜尋功能退化為純代號輸入 */ }
}

// ── 登入 / 建立帳號 ─────────────────────────────────────────────
async function doLogin() {
  const lineId = document.getElementById("inp-line-id").value.trim();
  const name   = document.getElementById("inp-name").value.trim() || "用戶";
  const msg    = document.getElementById("login-msg");

  if (!lineId.startsWith("U") || lineId.length < 10) {
    msg.innerHTML = '<span class="text-warning">LINE User ID 格式不正確，應以 U 開頭且長度 > 10</span>';
    return;
  }
  msg.innerHTML = '<span class="text-muted">查詢中…</span>';

  try {
    // 兩步驟註冊：
    // 1. INSERT with return=minimal（跳過 SELECT RLS，避免 INSERT+RETURNING 的時序問題）
    // 2. 再以 access_token GET 用戶資料
    const newToken = crypto.randomUUID();
    await sbPost("users", {
      line_user_id: lineId,
      display_name: name,
      access_token: newToken,
    }, null, true);  // minimal=true，不 RETURNING

    // 用剛產生的 token 讀取自己的資料
    const rows = await sbGet("users", {}, newToken);
    if (!rows || rows.length === 0) throw new Error("帳號建立後無法讀取，請重試");
    const row = rows[0];
    state = { userId: row.id, accessToken: newToken, displayName: row.display_name };
    localStorage.setItem("sma_session", JSON.stringify(state));

    msg.innerHTML = '<span class="text-success">✅ 帳號建立成功！</span>';
    await showMain();
  } catch (e) {
    // 若 line_user_id 已存在（UNIQUE 衝突），提示用 access_token 登入
    if (e.message.includes("23505") || e.message.includes("unique")) {
      showTokenLoginPrompt(lineId);
    } else {
      msg.innerHTML = `<span class="text-danger">❌ 錯誤：${e.message}</span>`;
    }
  }
}

function showTokenLoginPrompt(lineId) {
  const msg = document.getElementById("login-msg");
  msg.innerHTML = `
    <div class="alert alert-warning py-2 mt-2 small">
      此 LINE User ID 已有帳號。請輸入您的存取碼（Access Token）來繼續。
      <br>（存取碼在您首次建立帳號時由系統產生，請查收當時儲存的記錄）
      <div class="input-group mt-2">
        <input id="inp-token" class="form-control form-control-sm" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
        <button class="btn btn-sm btn-primary" onclick="doTokenLogin('${lineId}')">確認</button>
      </div>
    </div>`;
}

async function doTokenLogin(lineId) {
  const token = document.getElementById("inp-token").value.trim();
  const msg   = document.getElementById("login-msg");
  if (!token) return;
  try {
    // 以 access_token 查詢 user（RLS 會驗證 x-access-token header）
    const rows = await sbGet("users", { "line_user_id": `eq.${lineId}` }, token);
    if (!rows || rows.length === 0) {
      msg.innerHTML = '<span class="text-danger">❌ 存取碼不正確</span>';
      return;
    }
    const row = rows[0];
    state = { userId: row.id, accessToken: token, displayName: row.display_name };
    localStorage.setItem("sma_session", JSON.stringify(state));
    await showMain();
  } catch (e) {
    msg.innerHTML = `<span class="text-danger">❌ 驗證失敗：${e.message}</span>`;
  }
}

// ── 主畫面 ──────────────────────────────────────────────────────
async function showMain() {
  document.getElementById("login-section").style.display = "none";
  document.getElementById("main-section").style.display  = "";
  document.getElementById("nav-user").textContent = `👤 ${state.displayName}`;
  await loadWatchlist();
}

function logout() {
  localStorage.removeItem("sma_session");
  location.reload();
}

// ── 自選股清單 ──────────────────────────────────────────────────
async function loadWatchlist() {
  const rows = await sbGet("watchlist", {}, state.accessToken);
  renderWatchlist(rows);
}

function renderWatchlist(rows) {
  const tbody = document.getElementById("wl-body");
  tbody.innerHTML = "";
  document.getElementById("wl-count").textContent = rows.length;
  document.getElementById("wl-empty").style.display = rows.length ? "none" : "";
  document.getElementById("wl-table").style.display = rows.length ? "" : "none";

  rows.forEach(row => {
    const tr = document.createElement("tr");
    tr.dataset.id = row.id;
    tr.dataset.sid = row.stock_id;
    tr.innerHTML = `
      <td><span class="badge-sid">${row.stock_id}</span></td>
      <td class="text-muted small">${row.stock_name || "—"}</td>
      ${toggleCell(row, "alert_break_support")}
      ${toggleCell(row, "alert_near_support")}
      ${toggleCell(row, "alert_break_resistance")}
      ${toggleCell(row, "alert_near_resistance")}
      <td><button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="removeStock('${row.id}')">✕</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function toggleCell(row, field) {
  const checked = row[field] ? "checked" : "";
  return `<td class="text-center toggle-cell">
    <div class="form-check form-switch d-flex justify-content-center mb-0">
      <input class="form-check-input" type="checkbox" ${checked}
             onchange="updateAlert('${row.id}', '${field}', this.checked)">
    </div>
  </td>`;
}

async function updateAlert(rowId, field, value) {
  try {
    await sbPatch("watchlist", { "id": `eq.${rowId}` }, { [field]: value }, state.accessToken);
  } catch (e) {
    alert(`更新失敗：${e.message}`);
  }
}

async function removeStock(rowId) {
  try {
    await sbDelete("watchlist", { "id": `eq.${rowId}` }, state.accessToken);
    await loadWatchlist();
  } catch (e) {
    alert(`刪除失敗：${e.message}`);
  }
}

// ── 新增股票 ────────────────────────────────────────────────────
let selectedSid = null;

async function addStock() {
  const inp    = document.getElementById("inp-stock");
  const msgEl  = document.getElementById("add-msg");
  const rawVal = inp.value.trim();
  const sid    = selectedSid || rawVal.split(" ")[0].trim();
  const name   = universe[sid]?.n || "";

  if (!sid) { msgEl.innerHTML = '<span class="text-warning">請輸入股票代號</span>'; return; }

  msgEl.innerHTML = '<span class="text-muted">新增中…</span>';
  try {
    await sbPost("watchlist", {
      user_id:    state.userId,
      stock_id:   sid,
      stock_name: name,
      alert_break_support:    true,
      alert_near_support:     true,
      alert_break_resistance: false,
      alert_near_resistance:  false,
    }, state.accessToken);
    inp.value = "";
    selectedSid = null;
    document.getElementById("autocomplete-list").style.display = "none";
    msgEl.innerHTML = `<span class="text-success">✅ 已加入 ${sid} ${name}</span>`;
    await loadWatchlist();
  } catch (e) {
    if (e.message.includes("23505") || e.message.includes("unique")) {
      msgEl.innerHTML = `<span class="text-warning">⚠️ ${sid} 已在清單中</span>`;
    } else {
      msgEl.innerHTML = `<span class="text-danger">❌ 失敗：${e.message}</span>`;
    }
  }
}

// ── 股票搜尋自動完成 ─────────────────────────────────────────────
function onStockInput() {
  const q    = document.getElementById("inp-stock").value.trim().toLowerCase();
  const list = document.getElementById("autocomplete-list");
  selectedSid = null;
  if (!q || Object.keys(universe).length === 0) { list.style.display = "none"; return; }

  const matches = Object.entries(universe)
    .filter(([sid, v]) => sid.startsWith(q) || (v.n || "").toLowerCase().includes(q))
    .slice(0, 15);

  if (!matches.length) { list.style.display = "none"; return; }

  list.innerHTML = matches.map(([sid, v]) =>
    `<div class="dropdown-item" onclick="selectStock('${sid}', '${(v.n||"").replace(/'/g,"\\'")}')">
       <span class="badge-sid me-2">${sid}</span>${v.n || ""}
     </div>`
  ).join("");
  list.style.display = "block";
}

function selectStock(sid, name) {
  selectedSid = sid;
  document.getElementById("inp-stock").value = `${sid} ${name}`;
  document.getElementById("autocomplete-list").style.display = "none";
}

function onStockKey(e) {
  if (e.key === "Enter") { addStock(); return; }
  if (e.key === "Escape") document.getElementById("autocomplete-list").style.display = "none";
}

document.addEventListener("click", e => {
  if (!document.getElementById("inp-stock").contains(e.target))
    document.getElementById("autocomplete-list").style.display = "none";
});
</script>
</body>
</html>
